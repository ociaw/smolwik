name: Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Download dependencies
      run: cargo fetch --verbose --locked
    - name: Check
      run: cargo check --verbose --frozen
    - name: Build (debug)
      run: cargo build --verbose --frozen
    - name: Build (release)
      run: cargo build --release --verbose --frozen
    - name: Run tests (debug)
      run: cargo test --verbose --frozen
    - name: Run tests (release)
      run: cargo build --release --verbose --frozen
