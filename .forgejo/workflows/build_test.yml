name: Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        target: [ x86_64-unknown-linux-musl, x86_64-unknown-linux-gnu ]

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install rustup
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --profile minimal --default-toolchain nightly -y
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
    - name: Install target
      run: rustup target add ${{ matrix.target }}
    - name: Download dependencies
      run: cargo fetch --verbose --locked --target ${{ matrix.target }}
    - name: Check
      run: cargo check --verbose --frozen --target ${{ matrix.target }}
    - name: Build (debug)
      run: cargo build --verbose --frozen --target ${{ matrix.target }}
    - name: Build (release)
      run: cargo build --release --verbose --frozen --target ${{ matrix.target }}
    - name: Run tests (debug)
      run: cargo test --verbose --frozen --target ${{ matrix.target }}
    - name: Run tests (release)
      run: cargo build --release --verbose --frozen --target ${{ matrix.target }}
    - name: Debugging
      run: pwd; ls -la; ls -la ./target
    - name: Upload binary
      uses: forgejo/upload-artifact@v4
      with:
        name: "smolwik-${{ matrix.target }}"
        path: "./target/${{ matrix.target }}/release/smolwik"
